<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="stylesheet" href="./style/style.css" />

  <body>

        <a href="#">

        </a>
        <a href="#">
          <ion-icon name="logo-linkedin"></ion-icon>

    <script
